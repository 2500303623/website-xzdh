<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 - XZDH</title>
    <link rel="icon" type="image/png" href="wy_touxiang.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 页面主体 ========== */
        body {
            background-image: url('beijing2.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            color: rgb(23, 21, 21);
        }

        /* ========== 导航栏样式 ========== */
        nav {
            background-color: #e5e7e9;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: rgb(240, 101, 194);
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links a {
            font-family: "Comic Sans MS", "Segoe UI Emoji", sans-serif;
            color: rgb(240, 101, 194);
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* ========== 项目区域 ========== */
        .projects {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
        }

        .projects h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 100px;
            color: #141010;
        }

        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 10px;
            width: 280px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card h3 {
            color: #007bff;
            margin-bottom: 10px;
        }

        .card p {
            color: #100c0c;
            line-height: 1.5;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .coming-soon {
            text-align: center;
            font-size: 25px;
            margin-top: 40px;
            color: #100404;
            font-weight: bold;
        }

        /* ========== 动画类（JS触发后才生效） ========== */
        /* 初始状态：隐藏+下移（只等JS触发） */
        .animate-target {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* JS添加这个类后：显示+归位 */
        .animate-target.animate-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* 给每个元素不同的延迟 */
        .animate-target.delay-1 {
            transition-delay: 0.5s;
        }
        .animate-target.delay-2 {
            transition-delay: 0.7s;
        }
        .animate-target.delay-3 {
            transition-delay: 0.9s;
        }


        .card-link {
        text-decoration: none;      /* 去掉下划线 */
        display: block;             /* 让链接占满整个卡片 */
        }

        .about-cta {
            text-align: center;
            margin-top: 30px;
        }

        .about-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgb(240, 101, 194);
            color: white;
            border-radius: 28px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .about-btn:hover {
            transform: scale(1.03);
            background-color: rgb(215, 80, 182);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <a href="index.html" class="logo">XZ_DH</a>
        <div class="nav-links">
            <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="project.html">项目</a>
            <a href="blog.html">博客</a>   
            <a href="about.html">关于</a>
        
        </div>
    </nav>

    <!-- 项目展示区（给需要动画的元素加上对应类） -->
    <div class="projects">
        <!-- 标题：delay-1，最先出现 -->
        <h1 class="animate-target delay-1">PROJECTS</h1>
        
        <!-- 卡片容器：delay-2，第二个出现 -->
        <div class="card-container animate-target delay-2">
            <a href="https://github.com/2500303623/website-xzdh" target="_blank" class="card-link">
                <div class="card">
                    <h3>project 1  2026.05.02</h3>
                    <p>个人网页</p>
                </div>
            </a>
            <div class="card">
                <h3>project 2</h3>
                <p>...</p>
            </div>
            <div class="card">
                <h3>当前项目</h3>
                <p>搭建个人网站</p>
            </div>
        </div>
        
        <!-- 底部文字：delay-3，最后一个出现 -->
        <div class="coming-soon animate-target delay-3">更多精彩即将到来...</div>
        
    </div>

    <script>
        // 等待页面所有资源（包括背景图）加载完成后，再触发动画
        window.addEventListener('load', function() {
            // 获取所有需要动画的元素
            var elements = document.querySelectorAll('.animate-target');
            // 遍历并添加 animate-in 类，动画开始
            for (var i = 0; i < elements.length; i++) {
                elements[i].classList.add('animate-in');
            }
        });
    </script>
</body>
</html>
