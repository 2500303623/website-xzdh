<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 - XZDH</title>
    <link rel="icon" type="image/png" href="../images/wy_touxiang.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('../images/beijing2.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            color: rgb(23, 21, 21);
        }

        nav {
            background-color: #e5e7e9;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: rgb(240, 101, 194);
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links a {
            font-family: "Comic Sans MS", "Segoe UI Emoji", sans-serif;
            color: rgb(240, 101, 194);
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .projects {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
        }

        .projects h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 100px;
            color: #141010;
        }

        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 10px;
            width: 280px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card h3 {
            color: #007bff;
            margin-bottom: 10px;
        }

        .card p {
            color: #100c0c;
            line-height: 1.5;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .coming-soon {
            text-align: center;
            font-size: 25px;
            margin-top: 40px;
            color: #100404;
            font-weight: bold;
        }

        .animate-target {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .animate-target.animate-in {
            opacity: 1;
            transform: translateY(0);
        }

        .animate-target.delay-1 { transition-delay: 0.5s; }
        .animate-target.delay-2 { transition-delay: 0.7s; }
        .animate-target.delay-3 { transition-delay: 0.9s; }

        .card-link {
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">XZ_DH</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="project.html">项目</a>
            <a href="blog.html">博客</a>   
            <a href="about.html">关于</a>
        </div>
    </nav>

    <div class="projects">
        <h1 class="animate-target delay-1">PROJECTS</h1>
        
        <div class="card-container animate-target delay-2">
            <a href="https://github.com/2500303623/website-xzdh" target="_blank" class="card-link">
                <div class="card">
                    <h3>project 1 2026.05.02</h3>
                    <p>个人网页</p>
                </div>
            </a>
            
            <a href="https://github.com/2500303623/Snake-Game" target="_blank" class="card-link">
                <div class="card">
                    <h3>project 2 2026.05.03</h3>
                    <p>贪吃蛇小游戏 cpp</p>
                </div>
            </a>

            <div class="card">
                <h3>当前项目</h3>
                <p>无</p>
            </div>
        </div>
        
        <div class="coming-soon animate-target delay-3">更多精彩即将到来...</div>
    </div>

    <script>
        window.addEventListener('load', function() {
            var elements = document.querySelectorAll('.animate-target');
            for (var i = 0; i < elements.length; i++) {
                elements[i].classList.add('animate-in');
            }
        });
    </script>
</body>
</html>
