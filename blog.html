<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - XZDH</title>
    <!-- 网页图标 -->
    <link rel="icon" type="image/png" href="wy_touxiang.png">
    <!-- FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ========== 全局样式重置 ========== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        
        /* ========== 页面主体样式（背景立即显示，无动画） ========== */
        body {
            background-image: url('beijing3.webp');
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* ========== 导航栏样式 ========== */
        nav {
            background-color: #e5e7e9;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { 
            color: rgb(240, 101, 194);          
            font-size: 24px; 
            font-weight: bold; 
            text-decoration: none;
        }

        .nav-links a {
            font-family: "Comic Sans MS", sans-serif;
            color: rgb(240, 101, 194);               
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover { 
            text-decoration: underline; 
        }

        /* ========== 博客主容器 ========== */
        .blog-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        .blog-container h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 100px;
        }

        /* ========== 单篇博客文章卡片 ========== */
        .blog-post {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 15px;
            transition: transform 0.3s;
        }

        .blog-post:hover {
            transform: translateY(-5px);
        }

        .blog-post h2 {
            color: #007bff;
            margin-bottom: 10px;
        }

        .blog-date {
            color: #171010;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .blog-summary {
            color: #333;
            line-height: 1.6;
        }

        .read-more {
            display: inline-block;
            margin-top: 15px;
            color: #00a1d6;            
            text-decoration: none;
            font-weight: bold;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        .about-cta {
            text-align: center;
            margin-top: 30px;
        }

        .about-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgb(240, 101, 194);
            color: white;
            border-radius: 28px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .about-btn:hover {
            transform: scale(1.03);
            background-color: rgb(215, 80, 182);
        }

        /* ========== 动画类（JS触发后才生效） ========== */
        /* 初始状态：隐藏+下移 */
        .animate-target {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* JS添加这个类后：显示+归位 */
        .animate-target.animate-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* 延迟时间 */
        .animate-target.delay-1 {
            transition-delay: 0.5s;   /* 标题：等0.5秒 */
        }
        .animate-target.delay-2 {
            transition-delay: 0.7s;   /* 文章卡片：等0.7秒 */
        }

    </style>
</head>
<body>
    <!-- 导航栏（不参与动画，立即显示） -->
    <nav>
        <a href="index.html" class="logo">XZ_DH</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="project.html">项目</a>
            <a href="blog.html">博客</a>   
            <a href="about.html">关于</a>
        </div>
    </nav>

    <!-- 博客内容区域 -->
    <div class="blog-container">
        <!-- 标题：delay-1，最先出现 -->
        <h1 class="animate-target delay-1">BLOG</h1>
        
        <!-- 文章卡片：delay-2，第二个出现 -->
        <div class="blog-post animate-target delay-2">
            <h2>写点什么好呢...</h2>
            <div class="blog-date">2026-05-02</div>
            <p class="blog-summary"></p>
            <a href="#" class="read-more">阅读全文 →</a>
        </div>
    </div>
    

    <script>
        // 等待页面所有资源（包括背景图）加载完成后，再触发动画
        window.addEventListener('load', function() {
            var elements = document.querySelectorAll('.animate-target');
            for (var i = 0; i < elements.length; i++) {
                elements[i].classList.add('animate-in');
            }
        });
    </script>
</body>
</html>
